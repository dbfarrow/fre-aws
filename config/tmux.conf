#set default term 256-colors
set -g default-terminal "screen-256color"

# remap prefix to Control + x
unbind C-b
set -g prefix C-x

# eliminate Escape delay (important for Vim and Claude's editor)
set -g escape-time 0

# let Vim/Neovim detect pane focus changes
set -g focus-events on

# set up copy-mode bindings
set-window-option -g mode-keys vi

# Toggle mouse on/off
bind m set -g mouse on  \; display 'Mouse: ON'
bind M set -g mouse off \; display 'Mouse: OFF'

# Page Up enters copy mode automatically — no prefix needed
# In copy mode: Page Up/Down scroll, q exits
bind -n PageUp copy-mode -u

#pane/window/session count starts @ 1
set -g base-index 1

#increase history
set-option -g history-limit 500000

# status
setw -g window-status-format '#I:#W#F'
set  -g status-interval 10
set  -g status-justify centre
set  -g status-position bottom
set  -g status-style "fg=colour180,bg=colour234"
set  -g status-left '#[fg=colour232,bg=colour226,bold] #S@#H #[bg=colour234] '
set  -g status-right '#[fg=colour233,bg=colour241,bold] %m/%d #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set  -g status-right-length 50
set  -g status-left-length 20

# window
setw -g window-status-current-style "fg=colour81,bg=colour238,bold"
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-style "fg=colour250,bg=colour235"
setw -g window-status-format ' #I#[fg=colour243]:#[fg=colour250]#W#[fg=colour246]#F '

setw -g window-status-bell-style "bold,fg=colour255,bg=colour1"

# pane
set  -g pane-border-style "bg=colour235,fg=colour238"
set  -g pane-active-border-style "bg=colour236,fg=colour51"
